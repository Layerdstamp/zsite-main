<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#020000">
  <title>See More of Me | Zoe Lane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      font-family:'Cormorant Garamond', Georgia, serif;
      background:#000; color:#fff;
      height:100%; overflow:hidden;
      -webkit-tap-highlight-color:transparent;
      touch-action:none;
      overscroll-behavior:none;
    }

    /* NAV */
    .page-nav {
      position:fixed; top:0; left:0; right:0; z-index:50;
      padding:28px 28px 18px;
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(180deg, rgba(0,0,0,.7) 0%, transparent 100%);
    }
    .page-nav .nav-brand {
      font-family:'Playfair Display', serif;
      font-size:.97rem; letter-spacing:.3em; text-transform:uppercase;
      color:rgba(255,255,255,.6); text-decoration:none; transition:color .3s;
    }
    .page-nav .nav-brand:hover { color:#fff; }
    .page-nav .nav-links { display:flex; gap:24px; }
    .page-nav .nav-links a {
      font-size:.77rem; letter-spacing:.18em; text-transform:uppercase;
      color:rgba(255,255,255,.4); text-decoration:none; transition:color .3s;
    }
    .page-nav .nav-links a:hover { color:rgba(255,255,255,.8); }

    /* ALBUM SCREEN */
    #albumScreen {
      position:fixed; inset:0; z-index:10;
      display:flex; align-items:center; justify-content:center;
      background:#000;
    }
    .album-card {
      position:absolute;
      width:85vw; max-width:420px;
      height:75vh; max-height:680px;
      border-radius:14px; overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.8);
      transition:transform .5s cubic-bezier(.23,1,.32,1), opacity .5s;
      will-change:transform, opacity;
      cursor:grab;
    }
    .album-card:active { cursor:grabbing; }
    .album-card img {
      width:100%; height:100%; object-fit:cover; pointer-events:none;
      user-select:none; -webkit-user-drag:none;
    }
    .album-counter {
      position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
      z-index:15; font-size:.7rem; letter-spacing:.2em;
      color:rgba(255,255,255,.3);
    }
    .swipe-hint {
      position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
      z-index:15; font-size:.65rem; letter-spacing:.15em;
      color:rgba(255,255,255,.15);
      animation:fadeHint 3s ease-in-out infinite;
    }
    @keyframes fadeHint {
      0%,100%{ opacity:0; } 50%{ opacity:1; }
    }

    /* END SCREEN */
    #endScreen {
      position:fixed; inset:0; z-index:10;
      display:none; align-items:center; justify-content:center;
      flex-direction:column; gap:20px;
      background:#000;
    }
    .end-title {
      font-family:'Playfair Display', serif;
      font-size:1.1rem; letter-spacing:.3em; text-transform:uppercase;
      color:rgba(255,255,255,.5);
    }
    .end-back {
      font-size:.72rem; letter-spacing:.15em;
      color:rgba(255,255,255,.25);
      text-decoration:none;
      border-bottom:1px solid rgba(255,255,255,.1);
      padding-bottom:2px;
      transition:color .3s, border-color .3s;
    }
    .end-back:hover { color:rgba(255,255,255,.6); border-color:rgba(255,255,255,.3); }

    @media (max-width:600px){
      .page-nav { padding:max(28px, env(safe-area-inset-top, 28px)) 20px 14px; }
      .page-nav .nav-links { gap:14px; }
      .page-nav .nav-links a { font-size:.55rem; }
      .album-card { width:90vw; height:70vh; border-radius:10px; }
    }
  </style>
</head>
<body>

  <nav class="page-nav">
    <a class="nav-brand" href="../../index.html">Zoe Lane</a>
    <div class="nav-links">
      <a href="../../index.html">Home</a>
      <a href="https://layerdstamp.github.io/zsite/art/">Art</a>
      <a href="../">My Life</a>
    </div>
  </nav>

  <!-- Get Access button -->
  <div style="position:fixed; bottom:110px; left:0; right:0; z-index:40; text-align:center; pointer-events:none;">
    <div style="pointer-events:auto; display:inline-block; background:rgba(0,0,0,.72); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:14px; padding:16px 30px 14px; box-shadow:0 4px 30px rgba(0,0,0,.6);">
      <a href="https://layerdstamp.github.io/exclusive-content/index.htm" style="
        display:inline-block;
        font-family:'Playfair Display', Georgia, serif;
        font-size:.72rem;
        letter-spacing:.2em;
        text-transform:uppercase;
        color:rgba(255,255,255,.9);
        text-decoration:none;
        transition:color .3s;
      ">Get Access</a>
      <p style="margin-top:6px; font-size:.58rem; letter-spacing:.1em; color:rgba(255,255,255,.5); font-style:italic;">get an exclusive look and shop photos of me</p>
    </div>
  </div>

  <!-- Swipeable photo album -->
  <div id="albumScreen">
    <span class="swipe-hint">swipe to explore</span>
    <span class="album-counter" id="albumCounter"></span>
  </div>

  <!-- End screen after all photos -->
  <div id="endScreen">
    <div class="end-title">That's all for now</div>
    <a class="end-back" href="../">back to my life</a>
  </div>

  <script>
    /* ── PHOTO DATA ─────────────────────────── */
    var photos = [];
    for (var i = 1; i <= 33; i++) {
      photos.push('../../assets/images/bio/see-more-of-me/' + i + '.jpg');
    }

    /* ── SWIPEABLE ALBUM ────────────────────── */
    var albumScreen = document.getElementById('albumScreen');
    var albumCounter = document.getElementById('albumCounter');
    var endScreen = document.getElementById('endScreen');
    var albumIdx = 0;
    var cards = [];
    var isDragging = false, startX = 0, startY = 0, dx = 0, dy = 0;
    var throwing = false;
    var boundMove = null, boundEnd = null;

    function buildAlbum() {
      photos.forEach(function(src, i) {
        var card = document.createElement('div');
        card.className = 'album-card';
        card.style.zIndex = photos.length - i;
        if (i > 0) card.style.opacity = '0';
        card.innerHTML = '<img src="' + src + '" alt="Photo ' + (i+1) + '" loading="lazy" decoding="async">';
        albumScreen.insertBefore(card, albumCounter);
        cards.push(card);
      });
      updateCounter();
      attachSwipe();
    }

    function updateCounter() {
      albumCounter.textContent = albumIdx < photos.length
        ? (albumIdx + 1) + ' / ' + photos.length : '';
    }

    function cleanupSwipe() {
      if (boundMove) { window.removeEventListener('mousemove', boundMove); window.removeEventListener('touchmove', boundMove); }
      if (boundEnd) { window.removeEventListener('mouseup', boundEnd); window.removeEventListener('touchend', boundEnd); }
      boundMove = null; boundEnd = null;
    }

    function attachSwipe() {
      if (albumIdx >= cards.length || throwing) return;
      cleanupSwipe();
      var card = cards[albumIdx];

      var onStart = function(e) {
        if (throwing) return;
        isDragging = true;
        var pt = e.touches ? e.touches[0] : e;
        startX = pt.clientX; startY = pt.clientY;
        dx = 0; dy = 0;
        card.style.transition = 'none';
      };

      boundMove = function(e) {
        if (!isDragging) return;
        var pt = e.touches ? e.touches[0] : e;
        dx = pt.clientX - startX;
        dy = pt.clientY - startY;
        var rot = dx * .08;
        card.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + rot + 'deg)';
      };

      boundEnd = function() {
        if (!isDragging) return;
        isDragging = false;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 20) {
          throwCard(card, dx, dy);
        } else {
          card.style.transition = 'transform .3s cubic-bezier(.23,1,.32,1)';
          card.style.transform = '';
        }
      };

      card.addEventListener('mousedown', onStart);
      card.addEventListener('touchstart', onStart, {passive:true});
      window.addEventListener('mousemove', boundMove);
      window.addEventListener('touchmove', boundMove, {passive:true});
      window.addEventListener('mouseup', boundEnd);
      window.addEventListener('touchend', boundEnd);
    }

    function throwCard(card, dx, dy) {
      throwing = true;
      var angle = Math.atan2(dy, dx);
      var throwX = Math.cos(angle) * window.innerWidth * 1.8;
      var throwY = Math.sin(angle) * window.innerHeight * 1.8;
      var rot = dx * .2;
      card.style.transition = 'transform .45s cubic-bezier(.23,1,.32,1), opacity .45s';
      card.style.transform = 'translate(' + throwX + 'px,' + throwY + 'px) rotate(' + rot + 'deg)';
      card.style.opacity = '0';
      card.style.pointerEvents = 'none';

      card.addEventListener('transitionend', function handler(e) {
        if (e.propertyName !== 'transform') return;
        card.removeEventListener('transitionend', handler);

        albumIdx++;
        updateCounter();
        cleanupSwipe();
        throwing = false;

        if (albumIdx < cards.length) {
          cards[albumIdx].style.transition = 'opacity .3s';
          cards[albumIdx].style.opacity = '1';
          attachSwipe();
        } else {
          setTimeout(function() {
            albumScreen.style.display = 'none';
            endScreen.style.display = 'flex';
          }, 400);
        }
      });
    }

    buildAlbum();
  </script>

</body>
</html>
