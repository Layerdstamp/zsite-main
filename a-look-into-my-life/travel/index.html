<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020000">
  <title>Travel | Zoe Lane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Cormorant Garamond', Georgia, serif;
      background:#020000; color:#fff;
      min-height:100vh; overflow-x:hidden;
      -webkit-tap-highlight-color:transparent;
      overscroll-behavior:none;
    }
    .bg-fixed {
      position:fixed; inset:0; z-index:0;
      background:linear-gradient(180deg, #0a0a0a 0%, #050505 30%, #020000 60%, #000 100%);
    }
    .bg-fixed::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 50% 0%, rgba(30,30,35,.4) 0%, transparent 60%);
    }
    .glow-top {
      position:fixed; top:-120px; left:50%; transform:translateX(-50%);
      width:800px; height:400px; z-index:1; pointer-events:none;
      background:radial-gradient(ellipse at center,
        rgba(180,220,240,.12) 0%, rgba(140,200,230,.06) 30%,
        rgba(100,180,220,.03) 50%, transparent 70%);
      animation:glowPulse 6s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100%{ opacity:.6; transform:translateX(-50%) scale(1); }
      50%{ opacity:1; transform:translateX(-50%) scale(1.08); }
    }
    .glow-bottom {
      position:fixed; bottom:-80px; left:50%; transform:translateX(-50%);
      width:600px; height:300px; z-index:1; pointer-events:none;
      background:radial-gradient(ellipse at center,
        rgba(160,210,235,.06) 0%, rgba(120,190,220,.03) 40%, transparent 65%);
    }
    .page-nav {
      position:fixed; top:0; left:0; right:0; z-index:20;
      padding:28px 28px 18px;
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(180deg, rgba(2,0,0,.8) 0%, transparent 100%);
    }
    .page-nav .nav-brand {
      font-family:'Playfair Display', serif;
      font-size:.97rem; letter-spacing:.3em; text-transform:uppercase;
      color:rgba(255,255,255,.6); text-decoration:none; transition:color .3s;
    }
    .page-nav .nav-brand:hover { color:#fff; }
    .page-nav .nav-links { display:flex; gap:24px; }
    .page-nav .nav-links a {
      font-size:.77rem; letter-spacing:.18em; text-transform:uppercase;
      color:rgba(255,255,255,.4); text-decoration:none; transition:color .3s;
    }
    .page-nav .nav-links a:hover { color:rgba(255,255,255,.8); }
    .page-nav .nav-links a.active { color:rgba(255,255,255,.75); border-bottom:1px solid rgba(255,255,255,.3); }

    .content {
      position:relative; z-index:5;
      max-width:800px; margin:0 auto;
      padding:140px 28px 80px;
    }
    .page-header { text-align:center; margin-bottom:60px; }
    .page-header h1 {
      font-family:'Playfair Display', serif;
      font-size:2rem; font-weight:400;
      letter-spacing:.35em; text-transform:uppercase;
      color:rgba(255,255,255,.85); margin-bottom:12px;
    }
    .page-header .divider {
      width:60px; height:1px; margin:0 auto;
      background:linear-gradient(90deg, transparent, rgba(180,220,240,.4), transparent);
    }
    .page-intro {
      font-size:1.05rem; line-height:2; color:rgba(255,255,255,.55);
      font-weight:300; text-align:center; margin-bottom:50px;
      font-style:italic;
    }

    /* STORY BUBBLES */
    .story-row {
      display:flex; gap:20px; flex-wrap:wrap;
      justify-content:center;
      padding:0 10px; margin-bottom:60px;
      max-width:100%;
    }
    .story-bubble {
      display:flex; flex-direction:column; align-items:center;
      gap:10px; cursor:pointer;
      transition:transform .3s;
    }
    .story-bubble:active { transform:scale(.95); }
    @media(hover:hover){
      .story-bubble:hover { transform:scale(1.06); }
    }
    .story-ring {
      width:80px; height:80px; border-radius:50%;
      padding:3px;
      background:linear-gradient(135deg,
        rgba(180,220,240,.5), rgba(140,200,230,.2),
        rgba(180,220,240,.5));
    }
    .story-circle {
      width:100%; height:100%; border-radius:50%;
      background:#111; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
    }
    .story-circle img {
      width:100%; height:100%; object-fit:cover;
    }
    .story-circle .placeholder-icon {
      font-size:1.4rem; color:rgba(255,255,255,.15);
    }
    .story-label {
      font-size:.65rem; letter-spacing:.12em; text-transform:uppercase;
      color:rgba(255,255,255,.4);
      max-width:80px; text-align:center;
      line-height:1.3;
    }

    /* STORY OVERLAY */
    .story-overlay {
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,.95);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column;
      visibility:hidden; opacity:0;
      pointer-events:none;
      transition:opacity .4s, visibility .4s;
    }
    .story-overlay.active {
      visibility:visible; opacity:1;
      pointer-events:auto;
    }
    .story-overlay .close-btn {
      position:absolute; top:24px; right:28px;
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.25);
      width:40px; height:40px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      color:rgba(255,255,255,.7); font-size:1.4rem;
      transition:color .3s, background .3s, border-color .3s;
    }
    .story-overlay .close-btn:hover { color:#fff; background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.5); }
    .story-overlay .story-title {
      font-family:'Playfair Display', serif;
      font-size:1.2rem; letter-spacing:.25em; text-transform:uppercase;
      color:rgba(255,255,255,.7);
      margin-bottom:30px;
    }
    .story-collage {
      display:grid; grid-template-columns:1fr 1fr;
      gap:12px; max-width:460px; width:90%;
      max-height:75vh; overflow-y:auto;
      padding:4px;
    }
    .story-collage .collage-slot {
      aspect-ratio:3/4; border-radius:6px; overflow:hidden;
    }
    .story-collage .collage-slot img {
      display:block; width:100%; height:100%;
      object-fit:cover; object-position:center 20%;
    }
    .collage-placeholder {
      font-size:.7rem; color:rgba(255,255,255,.12);
      font-style:italic; letter-spacing:.08em;
    }

    .page-footer {
      position:relative; z-index:5;
      text-align:center; padding:40px 20px 30px;
      border-top:1px solid rgba(255,255,255,.04);
    }
    .page-footer span {
      font-size:.6rem; letter-spacing:.15em; color:rgba(255,255,255,.2);
    }

    @media (max-width:600px){
      .content { padding:120px 20px max(60px, env(safe-area-inset-bottom, 60px)); }
      .page-header h1 { font-size:1.4rem; letter-spacing:.25em; }
      .story-row { gap:14px; }
      .story-ring { width:60px; height:60px; }
      .story-label { font-size:.55rem; max-width:60px; }
      .story-collage { max-width:95vw; gap:8px; }
      .page-nav { padding:max(28px, env(safe-area-inset-top, 28px)) 20px 14px; }
      .page-nav .nav-links { gap:14px; }
      .page-nav .nav-links a { font-size:.55rem; }
    }
  </style>
</head>
<body>

  <div class="bg-fixed"></div>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <nav class="page-nav">
    <a class="nav-brand" href="../../index.html">Zoe Lane</a>
    <div class="nav-links">
      <a href="../../index.html">Home</a>
      <a href="https://layerdstamp.github.io/zsite/art/">Art</a>
      <a href="../">My Life</a>
    </div>
  </nav>

  <div class="content">
    <div class="page-header">
      <h1>Travel</h1>
      <div class="divider"></div>
    </div>

    <p class="page-intro">Favourite places, visual memories, and destination-based moments.</p>

    <div class="story-row" id="storyRow">
      <!-- Each bubble: data-story="id" links to overlay -->
    </div>
  </div>

  <!-- Story overlay (populated by JS) -->
  <div class="story-overlay" id="storyOverlay">
    <button class="close-btn" id="closeStory">&times;</button>
    <div class="story-title" id="storyTitle"></div>
    <div class="story-collage" id="storyCollage"></div>
  </div>

  <footer class="page-footer">
    <span>&copy; 2026 Zoe Lane</span>
  </footer>

  <script>
    var imgBase = '../../assets/images/bio/travel/';

    var destinations = [
      { name:'Boston', slug:'boston', count:4 },
      { name:'Chicago', slug:'chicago', count:6 },
      { name:'Delaware', slug:'delaware', count:4 },
      { name:'Gatlinburg', slug:'gatlinburg', count:3 },
      { name:'Ireland', slug:'ireland', count:6 },
      { name:'Kentucky', slug:'kentucky', count:5 },
      { name:'Los Angeles', slug:'la', count:6 },
      { name:'Miami', slug:'miami', count:3 },
      { name:'Myrtle Beach', slug:'myrtle-beach', count:4 },
      { name:'New York', slug:'new-york', count:4 },
      { name:'Virginia Beach', slug:'virginia-beach', count:5 },
      { name:'Washington D.C.', slug:'washington-dc', count:4 }
    ];

    // Build photo arrays from numbered files
    destinations.forEach(function(d) {
      d.cover = imgBase + d.slug + '/cover.jpg';
      d.photos = [];
      for (var i = 1; i <= d.count; i++) {
        d.photos.push(imgBase + d.slug + '/' + i + '.jpg');
      }
    });

    var storyRow = document.getElementById('storyRow');
    var overlay = document.getElementById('storyOverlay');
    var storyTitle = document.getElementById('storyTitle');
    var storyCollage = document.getElementById('storyCollage');
    var closeBtn = document.getElementById('closeStory');

    // Build bubbles with cover photos
    destinations.forEach(function(dest, idx) {
      var bubble = document.createElement('div');
      bubble.className = 'story-bubble';
      var lazy = idx > 5 ? ' loading="lazy"' : '';
      bubble.innerHTML =
        '<div class="story-ring">' +
          '<div class="story-circle">' +
            '<img src="' + dest.cover + '" alt="' + dest.name + '" decoding="async"' + lazy + '>' +
          '</div>' +
        '</div>' +
        '<span class="story-label">' + dest.name + '</span>';
      bubble.addEventListener('click', function() { openStory(dest); });
      storyRow.appendChild(bubble);
    });

    function openStory(dest) {
      storyTitle.textContent = dest.name;
      storyCollage.innerHTML = '';
      storyCollage.className = 'story-collage';

      var photos = dest.photos;

      for (var j = 0; j < photos.length; j++) {
        var s = document.createElement('div');
        s.className = 'collage-slot';
        s.innerHTML = '<img src="' + photos[j] + '" alt="' + dest.name + '" loading="lazy" decoding="async">';
        storyCollage.appendChild(s);
      }
      overlay.classList.add('active');
    }

    closeBtn.addEventListener('click', function() {
      overlay.classList.remove('active');
    });
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.classList.remove('active');
    });
  </script>

</body>
</html>
