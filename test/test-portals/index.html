<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Zoe Lane</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.164.1/build/three.module.js","three/addons/":"https://unpkg.com/three@0.164.1/examples/jsm/"}}</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{position:fixed;inset:0;display:block}
#nameplate{
  position:fixed;top:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding-top:34px;pointer-events:none;z-index:20;
}
#nameplate h1{
  font-family:'Playfair Display',serif;font-size:clamp(20px,4.5vw,30px);
  font-weight:400;letter-spacing:0.28em;color:#fff;
  text-shadow:0 0 20px rgba(180,20,20,0.7),0 0 60px rgba(180,20,20,0.2);
}
#nameplate .sub{
  margin-top:5px;font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(10px,2vw,13px);letter-spacing:0.35em;
  color:rgba(255,255,255,0.32);
}
#hint{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:10px;letter-spacing:0.3em;color:rgba(255,255,255,0.22);
  pointer-events:none;z-index:20;animation:fh 5s ease 2s both;
}
@keyframes fh{0%{opacity:0}20%{opacity:1}75%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="nameplate"><h1>ZOE LANE</h1><div class="sub">model · artist · creator</div></div>
<div id="hint">drag to orbit · scroll to zoom</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

/* ═══════════════════════════════════════════════
   STILETTO SILHOUETTE  — cubic Bézier outline
   Traced like a vector path for smooth real curves.
   Toe points left (-x), heel right (+x), y = up.
   ═══════════════════════════════════════════════ */

// Cubic Bézier evaluator
function cb(t, p0, p1, p2, p3) {
  const u = 1 - t;
  return [
    u*u*u*p0[0] + 3*u*u*t*p1[0] + 3*u*t*t*p2[0] + t*t*t*p3[0],
    u*u*u*p0[1] + 3*u*u*t*p1[1] + 3*u*t*t*p2[1] + t*t*t*p3[1],
  ];
}

// Sample a cubic bézier into n points (excluding start to avoid dupes)
function sampleBez(p0, cp1, cp2, p1, n = 40) {
  const pts = [];
  for (let i = 1; i <= n; i++) pts.push(cb(i / n, p0, cp1, cp2, p1));
  return pts;
}

// Build outline from Bézier segments — clockwise
const SILHOUETTE = [
  // ── TOP: toe tip → heel cup  (the "upper" of the shoe)
  // B0: Sharp pointed toe tip rises gently
  ...sampleBez([-3.40, -0.95], [-3.10, -0.80], [-2.70, -0.55], [-2.20, -0.25], 35),
  // B1: Toe box → vamp  (steeper rise along top of foot)
  ...sampleBez([-2.20, -0.25], [-1.70,  0.10], [-1.10,  0.50], [-0.50,  0.90], 35),
  // B2: Vamp → throat → instep  (sweeping arch upward)
  ...sampleBez([-0.50,  0.90], [ 0.00,  1.25], [ 0.30,  1.55], [ 0.65,  1.75], 30),
  // B3: Instep → heel collar → lip  (top of heel cup)
  ...sampleBez([ 0.65,  1.75], [ 0.80,  1.85], [ 0.95,  1.88], [ 1.08,  1.82], 25),
  // B4: Lip curves back/down into heel cup interior
  ...sampleBez([ 1.08,  1.82], [ 1.15,  1.78], [ 1.18,  1.65], [ 1.18,  1.45], 20),

  // ── BACK: heel cup down → heel column  (the counter + stiletto)
  // B5: Counter → top of heel column
  ...sampleBez([ 1.18,  1.45], [ 1.16,  1.10], [ 1.10,  0.60], [ 1.04,  0.20], 25),
  // B6: Upper heel column — slight backward lean
  ...sampleBez([ 1.04,  0.20], [ 1.00, -0.15], [ 0.97, -0.55], [ 0.95, -0.90], 25),
  // B7: Lower heel column → tapers to tip
  ...sampleBez([ 0.95, -0.90], [ 0.93, -1.20], [ 0.91, -1.50], [ 0.88, -1.72], 20),
  // B8: Heel tip — tiny smooth round
  ...sampleBez([ 0.88, -1.72], [ 0.86, -1.80], [ 0.80, -1.82], [ 0.76, -1.75], 15),
  // B9: Tip front → up inner heel column
  ...sampleBez([ 0.76, -1.75], [ 0.74, -1.55], [ 0.74, -1.20], [ 0.75, -0.90], 20),
  // B10: Inner heel column → top of column
  ...sampleBez([ 0.75, -0.90], [ 0.76, -0.55], [ 0.78, -0.15], [ 0.82,  0.15], 25),

  // ── BOTTOM: arch underside → sole → back to toe
  // B11: Heel seat → arch gap (curves DOWN away from foot — this creates the visible arch)
  ...sampleBez([ 0.82,  0.15], [ 0.65, -0.05], [ 0.30, -0.40], [-0.10, -0.65], 35),
  // B12: Deep arch gap → ball of foot (sole starts touching ground)
  ...sampleBez([-0.10, -0.65], [-0.50, -0.82], [-0.95, -0.95], [-1.45, -1.00], 30),
  // B13: Ball → sole flat under toes
  ...sampleBez([-1.45, -1.00], [-1.90, -1.03], [-2.40, -1.02], [-2.80, -1.00], 25),
  // B14: Sole → pointed toe tip (close the polygon)
  ...sampleBez([-2.80, -1.00], [-3.05, -0.99], [-3.25, -0.98], [-3.40, -0.95], 20),
];

/* Point-in-polygon test (ray casting) */
function insidePoly(x, y, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i][0], yi = poly[i][1];
    const xj = poly[j][0], yj = poly[j][1];
    if ((yi > y) !== (yj > y) && x < (xj - xi) * (y - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

/* Depth profile — smooth interpolation along x-axis
   Toe: knife-edge thin → ball: widest → arch: thinner → heel seat: mid → column: very thin */
function depthAt(x) {
  // Piecewise smooth: lerp between control values
  const nodes = [
    [-3.40, 0.08],  // toe tip — razor thin
    [-2.80, 0.18],  // front toe
    [-2.00, 0.40],  // toe box — widening
    [-1.20, 0.62],  // ball of foot — widest
    [-0.40, 0.55],  // mid foot
    [ 0.20, 0.40],  // arch — narrows
    [ 0.60, 0.35],  // heel seat
    [ 0.82, 0.25],  // heel column top
    [ 0.95, 0.16],  // heel column mid
    [ 1.18, 0.14],  // counter (back of heel cup)
  ];
  // clamp to range
  if (x <= nodes[0][0]) return nodes[0][1];
  if (x >= nodes[nodes.length-1][0]) return nodes[nodes.length-1][1];
  // find segment & lerp
  for (let i = 0; i < nodes.length - 1; i++) {
    if (x <= nodes[i+1][0]) {
      const t = (x - nodes[i][0]) / (nodes[i+1][0] - nodes[i][0]);
      return nodes[i][1] + (nodes[i+1][1] - nodes[i][1]) * t;
    }
  }
  return 0.2;
}

/* ═══════════════════════════════════════════════
   GENERATE PARTICLES  
   ═══════════════════════════════════════════════ */
const COUNT = 14000;
const positions = [];
const scales    = [];
const colors    = [];

const colorBase   = new THREE.Color(0x1a0505);
const colorAccent = new THREE.Color(0x881035);
const colorBright = new THREE.Color(0xcc1845);

let attempts = 0;
while (positions.length < COUNT && attempts < COUNT * 8) {
  attempts++;

  const x = -3.5 + Math.random() * 4.8;   // -3.5 to 1.3
  const y = -2.0 + Math.random() * 4.0;   // -2.0 to 2.0

  if (!insidePoly(x, y, SILHOUETTE)) continue;

  const d = depthAt(x);
  const z = (Math.random() - 0.5) * d;

  positions.push(x, y, z);

  const s = 0.016 + Math.random() * 0.012 + (Math.random() < 0.04 ? 0.015 : 0);
  scales.push(s);

  // Color: mostly dark, occasional red accent, rare bright
  const r = Math.random();
  const c = new THREE.Color();
  if (r < 0.72)      c.copy(colorBase).lerp(colorAccent, Math.random() * 0.3);
  else if (r < 0.92) c.copy(colorAccent);
  else                c.copy(colorBright);
  colors.push(c.r, c.g, c.b);
}

const PARTICLE_COUNT = positions.length / 3;

/* ═══════════════════════════════════════════════
   RENDERER
   ═══════════════════════════════════════════════ */
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;

/* Environment map — makes metallic surfaces visible */
const pmrem  = new THREE.PMREMGenerator(renderer);
const envMap = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const scene = new THREE.Scene();
scene.background         = new THREE.Color(0x020000);
scene.environment        = envMap;
scene.environmentIntensity = 0.35;
scene.fog = new THREE.FogExp2(0x050000, 0.035);

const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 80);
camera.position.set(0, 0.5, 6);

/* ═══════════════════════════════════════════════
   ORBIT CONTROLS
   ═══════════════════════════════════════════════ */
const controls = new OrbitControls(camera, canvas);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.enablePan      = false;
controls.minDistance     = 2.5;
controls.maxDistance     = 12;
controls.autoRotate     = true;
controls.autoRotateSpeed = 0.8;
controls.target.set(0, -0.1, 0);

/* ═══════════════════════════════════════════════
   POST-PROCESSING
   ═══════════════════════════════════════════════ */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.2,   // strength
  0.55,  // radius
  0.30   // threshold
));
composer.addPass(new OutputPass());

/* ═══════════════════════════════════════════════
   LIGHTS  — fashion photography setup
   ═══════════════════════════════════════════════ */
scene.add(new THREE.AmbientLight(0x1a0808, 1.5));

// High key from upper-left (cool white, strong)
const key = new THREE.DirectionalLight(0xfff0ee, 4.0);
key.position.set(-4, 5, 4);
scene.add(key);

// Red rim from below-right
const rim = new THREE.PointLight(0xdd1045, 9.75, 12);
rim.position.set(3, -3, 3);
scene.add(rim);

// Warm fill left
const fill = new THREE.PointLight(0xffe0cc, 3, 14);
fill.position.set(-4, 1, 3);
scene.add(fill);

// Subtle red under-glow
const up = new THREE.PointLight(0xbb0835, 3.9, 10);
up.position.set(0, -4, 2);
scene.add(up);

// Cool back light (hair light equivalent)
const back = new THREE.DirectionalLight(0xccddff, 1.5);
back.position.set(0, 2, -4);
scene.add(back);

/* ═══════════════════════════════════════════════
   INSTANCED MESH  — glossy obsidian beads
   ═══════════════════════════════════════════════ */
const beadGeo = new THREE.IcosahedronGeometry(1, 2);  // smooth-ish sphere

const beadMat = new THREE.MeshPhysicalMaterial({
  color:              0x1a0808,
  roughness:          0.08,
  metalness:          0.85,
  envMapIntensity:    2.2,
  clearcoat:          1.0,
  clearcoatRoughness: 0.02,
  reflectivity:       1.0,
});

const instancedMesh = new THREE.InstancedMesh(beadGeo, beadMat, PARTICLE_COUNT);
const dummy  = new THREE.Object3D();
const colorA = new THREE.Color();
const instanceColors = new Float32Array(PARTICLE_COUNT * 3);

// Store original positions for animation
const origPositions = new Float32Array(PARTICLE_COUNT * 3);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const x = positions[i * 3];
  const y = positions[i * 3 + 1];
  const z = positions[i * 3 + 2];
  const s = scales[i];

  origPositions[i * 3]     = x;
  origPositions[i * 3 + 1] = y;
  origPositions[i * 3 + 2] = z;

  dummy.position.set(x, y, z);
  dummy.scale.setScalar(s);
  dummy.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
  dummy.updateMatrix();
  instancedMesh.setMatrixAt(i, dummy.matrix);

  instanceColors[i * 3]     = colors[i * 3];
  instanceColors[i * 3 + 1] = colors[i * 3 + 1];
  instanceColors[i * 3 + 2] = colors[i * 3 + 2];
}

instancedMesh.instanceMatrix.needsUpdate = true;
instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(instanceColors, 3);
scene.add(instancedMesh);

/* ═══════════════════════════════════════════════
   EMISSIVE ACCENT BEADS  — scattered glowing red particles
   (separate instanced mesh so they bloom)
   ═══════════════════════════════════════════════ */
const GLOW_COUNT = Math.floor(PARTICLE_COUNT * 0.035);
const glowMat    = new THREE.MeshStandardMaterial({
  color: 0x000000,
  emissive: new THREE.Color(0xcc1845),
  emissiveIntensity: 2.93,
  transparent: true,
  opacity: 0.9,
});

const glowMesh = new THREE.InstancedMesh(
  new THREE.IcosahedronGeometry(1, 1), glowMat, GLOW_COUNT
);

const glowIndices = [];
for (let i = 0; i < GLOW_COUNT; i++) {
  const idx = Math.floor(Math.random() * PARTICLE_COUNT);
  glowIndices.push(idx);
  const x = origPositions[idx*3];
  const y = origPositions[idx*3+1];
  const z = origPositions[idx*3+2];
  dummy.position.set(x, y, z);
  dummy.scale.setScalar(scales[idx] * 1.4);
  dummy.updateMatrix();
  glowMesh.setMatrixAt(i, dummy.matrix);
}
glowMesh.instanceMatrix.needsUpdate = true;
scene.add(glowMesh);

/* ═══════════════════════════════════════════════
   AMBIENT DUST  — floating particles in space
   ═══════════════════════════════════════════════ */
const DUST = 300;
const dustPos = new Float32Array(DUST * 3);
for (let i = 0; i < DUST; i++) {
  dustPos[i*3]   = (Math.random()-0.5) * 18;
  dustPos[i*3+1] = (Math.random()-0.5) * 14;
  dustPos[i*3+2] = (Math.random()-0.5) * 10 - 2;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
scene.add(new THREE.Points(dustGeo, new THREE.PointsMaterial({
  color: 0x660808, size: 0.018, transparent: true, opacity: 0.45,
  blending: THREE.AdditiveBlending, depthWrite: false,
})));

/* ═══════════════════════════════════════════════
   GROUND REFLECTION PLANE  (subtle)
   ═══════════════════════════════════════════════ */
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshPhysicalMaterial({
  color: 0x050000,
  roughness: 0.15,
  metalness: 0.9,
  envMapIntensity: 0.8,
  transparent: true,
  opacity: 0.4,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.45;
scene.add(ground);

/* ═══════════════════════════════════════════════
   MOUSE INTERACTION  — particles near cursor breathe outward
   ═══════════════════════════════════════════════ */
const mouse3D = new THREE.Vector3(999, 999, 0);  // off-screen initially
const raycaster = new THREE.Raycaster();
const pointer   = new THREE.Vector2();

// Invisible interaction plane aligned to shoe
const interPlane  = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
const interTarget = new THREE.Vector3();

window.addEventListener('mousemove', e => {
  pointer.x =  (e.clientX / innerWidth)  * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  raycaster.ray.intersectPlane(interPlane, interTarget);
  if (interTarget) mouse3D.copy(interTarget);
});
window.addEventListener('mouseleave', () => mouse3D.set(999, 999, 0));

/* ═══════════════════════════════════════════════
   RESIZE
   ═══════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

/* ═══════════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════════ */
let t = 0;
const breatheDir = new THREE.Vector3();

function animate(now) {
  requestAnimationFrame(animate);
  t = now * 0.001;

  controls.update();

  // Particle animation: gentle breathing + mouse repulsion
  const mat4 = new THREE.Matrix4();
  const pos  = new THREE.Vector3();
  const scl  = new THREE.Vector3();
  const quat = new THREE.Quaternion();

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const ox = origPositions[i*3];
    const oy = origPositions[i*3+1];
    const oz = origPositions[i*3+2];

    // Gentle breathing: particles shift slightly outward from center
    const breathe = Math.sin(t * 0.8 + ox * 1.5 + oy * 1.2) * 0.012;
    let px = ox + ox * breathe * 0.15;
    let py = oy + oy * breathe * 0.15;
    let pz = oz + oz * breathe * 0.5;

    // Mouse repulsion
    const dx = px - mouse3D.x;
    const dy = py - mouse3D.y;
    const dz = pz - mouse3D.z;
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (dist < 1.2) {
      const force = (1.2 - dist) * 0.25;
      const invD  = 1 / (dist + 0.01);
      px += dx * invD * force;
      py += dy * invD * force;
      pz += dz * invD * force;
    }

    instancedMesh.getMatrixAt(i, mat4);
    mat4.decompose(pos, quat, scl);
    pos.set(px, py, pz);
    mat4.compose(pos, quat, scl);
    instancedMesh.setMatrixAt(i, mat4);
  }
  instancedMesh.instanceMatrix.needsUpdate = true;

  // Glow beads pulse
  glowMat.emissiveIntensity = 3.0 + Math.sin(t * 2.0) * 1.2;

  // Also update glow bead positions to match
  for (let i = 0; i < GLOW_COUNT; i++) {
    const idx = glowIndices[i];
    instancedMesh.getMatrixAt(idx, mat4);
    mat4.decompose(pos, quat, scl);
    scl.multiplyScalar(1.4 / scl.x * scales[idx]);
    // Keep glow slightly scaled
    dummy.position.copy(pos);
    dummy.scale.setScalar(scales[idx] * 1.5);
    dummy.updateMatrix();
    glowMesh.setMatrixAt(i, dummy.matrix);
  }
  glowMesh.instanceMatrix.needsUpdate = true;

  // Dust drift
  const dPos = dustGeo.attributes.position;
  for (let i = 0; i < DUST; i++) {
    dPos.array[i*3+1] += 0.0005;
    if (dPos.array[i*3+1] > 7) dPos.array[i*3+1] = -7;
    dPos.array[i*3] += Math.sin(t * 0.3 + i) * 0.0002;
  }
  dPos.needsUpdate = true;

  // Rim light orbits slowly for shifting specular highlights
  rim.position.x = Math.sin(t * 0.15) * 4;
  rim.position.z = Math.cos(t * 0.15) * 4;

  composer.render();
}

animate(0);
</script>
</body>
</html>
