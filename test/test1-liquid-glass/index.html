<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Test 1 – Liquid Glass | Zoe Lane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Playfair Display', Georgia, serif;
      background: #0e0c0a;
      color: #c8b59b;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Full-page blurred photo — gives the glass something real to refract */
    .bg-photo {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url(../../assets/images/bio/cover.jpg) center / cover no-repeat;
      filter: blur(22px) brightness(0.55) saturate(1.2);
      transform: scale(1.08); /* hide blur edges */
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 60px;
    }

    /* 3-up cover strip */
    .cover-strip {
      width: 100%;
      display: flex;
      aspect-ratio: 16 / 6;
      overflow: hidden;
    }
    .cover-strip img {
      width: 33.334%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-wrap {
      margin-top: -52px;
      position: relative;
      z-index: 2;
    }
    .avatar {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      border: 3px solid rgba(200,181,155,.3);
      object-fit: cover;
      box-shadow: 0 4px 24px rgba(0,0,0,.6);
    }

    .display-name {
      margin-top: 14px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: .02em;
      text-align: center;
      color: #c8b59b;
    }

    .socials {
      display: flex;
      gap: 20px;
      margin-top: 16px;
    }
    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      transition: opacity .2s;
    }
    .socials a:hover { opacity: .75; }
    .socials svg { width: 22px; height: 22px; fill: #c8b59b; }
    a { color: inherit; text-decoration: none; }

    /* Container where LiquidGlass buttons will be inserted */
    #links {
      width: 100%;
      padding: 0 20px;
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Shared inner content style for button text/thumb */
    .btn-inner {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 90px;
      text-decoration: none;
      color: #c8b59b;
    }
    .btn-thumb {
      width: 68px;
      height: 68px;
      object-fit: cover;
      border-radius: 10px;
      margin: 2px;
      flex-shrink: 0;
    }
    .btn-thumb-icon {
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }
    .btn-label {
      flex: 1;
      text-align: center;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 0 12px;
    }
    .btn-spacer {
      width: 68px;
      flex-shrink: 0;
    }

    /* Fallback buttons shown while library loads */
    .link-btn-fallback {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 90px;
      background: rgba(200,181,155,.08);
      border: 1px solid rgba(200,181,155,.18);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: background .2s;
    }
    .link-btn-fallback:hover { background: rgba(200,181,155,.14); }

    @media (max-width: 520px) {
      .page { max-width: 100%; }
    }
  </style>
</head>

<body>
  <!-- Full-page blurred background photo (gives glass something to refract) -->
  <div class="bg-photo"></div>

  <div class="page">
    <div class="cover-strip">
      <img src="../../assets/images/bio/cover.jpg" alt="Cover">
      <img src="../../assets/images/bio/cover.jpg" alt="Cover">
      <img src="../../assets/images/bio/cover.jpg" alt="Cover">
    </div>

    <div class="avatar-wrap">
      <img class="avatar" src="../../assets/images/bio/avatar.jpg" alt="Zoe Lane">
    </div>

    <h1 class="display-name">❦༺𝒵𝑜𝑒 𝐿𝒶𝓃𝑒༻❦</h1>

    <nav class="socials" aria-label="Social links">
      <a href="https://www.instagram.com/solelyzoelane" target="_blank" rel="noreferrer noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Zm5.25-2.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/></svg>
      </a>
      <a href="https://www.tiktok.com/@solelyzoelane" target="_blank" rel="noreferrer noopener" aria-label="TikTok">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16.6 5.82A4.278 4.278 0 0 1 13.81 3h-3.09v12.4a2.592 2.592 0 0 1-2.59 2.5c-1.42 0-2.6-1.16-2.6-2.59a2.59 2.59 0 0 1 2.6-2.59c.27 0 .53.04.77.12V9.7a6.126 6.126 0 0 0-.77-.05 5.96 5.96 0 0 0-5.96 5.96 5.96 5.96 0 0 0 5.96 5.96 5.96 5.96 0 0 0 5.96-5.96V9.01a7.61 7.61 0 0 0 4.51 1.47V7.4a4.28 4.28 0 0 1-1.94-.58Z"/></svg>
      </a>
      <a href="mailto:solelyzoelane@gmail.com" aria-label="Email">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 2-8 5-8-5Zm0 12H4V8l8 5 8-5Z"/></svg>
      </a>
    </nav>

    <!-- Buttons injected here by JS -->
    <div id="links">
      <!-- Fallback buttons visible while the library loads -->
      <a class="link-btn-fallback" id="fallback-art" href="../../art/">
        <img class="btn-thumb" src="../../assets/images/bio/art-thumbnail.jpg" alt="Art">
        <span class="btn-label">zoelaneart | art &amp; design</span>
        <span class="btn-spacer"></span>
      </a>
      <a class="link-btn-fallback" id="fallback-life" href="../../a-look-into-my-life/">
        <span class="btn-thumb-icon">❦</span>
        <span class="btn-label">a look into my life</span>
        <span class="btn-spacer"></span>
      </a>
    </div>
  </div>

  <script type="module">
    // @specy/liquid-glass — vanilla JS, Three.js + html2canvas bundled
    // Takes a real DOM screenshot, renders actual glass refraction via WebGL
    import { LiquidGlass } from 'https://cdn.jsdelivr.net/npm/@specy/liquid-glass@1.12.1/dist/index.js';

    const glassStyle = {
      depth: 180,        // thick slab geometry — this is the key "epoxy block" param
      segments: 64,      // smooth rounded edges
      radius: 14,
      roughness: 0,      // perfectly polished clear resin surface
      transmission: 1,   // fully transparent
      reflectivity: 0.65, // strong surface reflections like polished resin
      ior: 2.1,          // high IOR = dramatic light bending through thick material
      thickness: 220,    // how far light travels, bends background heavily
      dispersion: 0.18,  // prismatic rainbow at edges (characteristic of thick resin)
      tint: null,        // no tint — crystal clear
    };

    const screenshotOpts = {
      allowTaint: true,
      useCORS: true,
      scale: 1,
    };

    // CSS applied to each glass element container
    const btnStyle = `
      display: block;
      width: 100%;
      min-height: 90px;
      border-radius: 18px;
      cursor: pointer;
      overflow: hidden;
    `;

    function makeInner(thumbHtml, label, href) {
      const a = document.createElement('a');
      a.href = href;
      a.className = 'btn-inner';
      a.innerHTML = `
        ${thumbHtml}
        <span class="btn-label">${label}</span>
        <span class="btn-spacer"></span>
      `;
      return a;
    }

    async function init() {
      const linksDiv = document.getElementById('links');

      // Art button
      const artGlass = new LiquidGlass(document.body, screenshotOpts, btnStyle, glassStyle);
      artGlass.content.appendChild(makeInner(
        `<img class="btn-thumb" src="../../assets/images/bio/art-thumbnail.jpg" alt="Art">`,
        'zoelaneart | art &amp; design',
        '../../art/'
      ));

      // Life button
      const lifeGlass = new LiquidGlass(document.body, screenshotOpts, btnStyle, glassStyle);
      lifeGlass.content.appendChild(makeInner(
        `<span class="btn-thumb-icon">❦</span>`,
        'a look into my life',
        '../../a-look-into-my-life/'
      ));

      // Replace fallback buttons with real glass ones
      linksDiv.innerHTML = '';
      linksDiv.appendChild(artGlass.element);
      linksDiv.appendChild(lifeGlass.element);
    }

    // Small delay to let page render fully before html2canvas captures it
    window.addEventListener('load', () => {
      setTimeout(() => init().catch(() => {
        // If library fails (e.g. file:// CORS), fallbacks are already in the DOM
        document.getElementById('links').innerHTML = `
          <a class="link-btn-fallback" href="../../art/">
            <img class="btn-thumb" src="../../assets/images/bio/art-thumbnail.jpg" alt="Art">
            <span class="btn-label">zoelaneart | art &amp; design</span>
            <span class="btn-spacer"></span>
          </a>
          <a class="link-btn-fallback" href="../../a-look-into-my-life/">
            <span class="btn-thumb-icon">❦</span>
            <span class="btn-label">a look into my life</span>
            <span class="btn-spacer"></span>
          </a>
        `;
      }), 300);
    });
  </script>
</body>
</html>
